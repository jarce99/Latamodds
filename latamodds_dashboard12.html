<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATAMODDS — Feed de Mercados</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c0f;
    --surface: #0f1419;
    --border: #1e2830;
    --accent: #00e5a0;
    --accent2: #ff4d6d;
    --accent3: #ffd60a;
    --text: #e8edf2;
    --muted: #4a5568;
    --polymarket: #0066ff;
    --kalshi: #8b5cf6;
    --opinion: #f97316;
    --predictfun: #ec4899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    background: rgba(9,12,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .meta-bar {
    display: flex;
    gap: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-bar strong { color: var(--accent); }

  /* Hero */
  .hero {
    padding: 60px 0 40px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .hero-title .highlight { color: var(--accent); }
  .hero-title .dim { color: var(--muted); }

  .hero-sub {
    font-size: 14px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin: 40px 0;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat {
    background: var(--surface);
    padding: 24px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .tab {
    padding: 12px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.05);
  }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .card {
    background: var(--surface);
    padding: 20px;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card:hover { background: #131820; }
  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
    padding-right: 12px;
  }

  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
    white-space: nowrap;
  }

  .card-price.high { color: var(--accent); }
  .card-price.mid { color: var(--accent3); }
  .card-price.low { color: var(--accent2); }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tag-platform { background: rgba(0,102,255,0.15); color: #4d9fff; border: 1px solid rgba(0,102,255,0.3); }
  .tag-kalshi   { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
  .tag-opinion  { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
  .tag-query    { background: rgba(0,229,160,0.08); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
  .tag-type     { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-vol {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card-vol strong { color: var(--text); }

  .card-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
    transition: opacity 0.15s;
  }

  .card-link:hover { opacity: 1; }

  /* Sources bar */
  .sources-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }

  .source-pill {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Section title */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    padding: 60px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 13px;
  }

  /* Panel sections */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Confidence dot */
  .conf-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .conf-high { background: var(--accent); }
  .conf-medium { background: var(--accent3); }
  .conf-low { background: var(--muted); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .hero-title { font-size: 52px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap header-inner">
    <div class="logo">LATA<span>MODDS</span></div>
    <div style="display:flex;align-items:center;gap:24px;">
      <div class="live-badge">
        <div class="live-dot"></div>
        Live Feed
      </div>
      <div class="meta-bar" id="metaBar">—</div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="hero">
    <div class="hero-title">
      <div>PREDICTION</div>
      <div><span class="highlight">MARKETS</span> <span class="dim">LATAM</span></div>
    </div>
    <div class="hero-sub">POLYMARKET · KALSHI · OPINION · PREDICTFUN — EN ESPAÑOL</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statMercados">—</div>
      <div class="stat-label">Mercados c/ Precio</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statEventos">—</div>
      <div class="stat-label">Eventos LATAM</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statFuentes">4</div>
      <div class="stat-label">Fuentes</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statActualizado">—</div>
      <div class="stat-label">Última Ingesta</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('mercados', this)">Mercados c/ Precio</div>
    <div class="tab" onclick="switchTab('eventos', this)">Eventos LATAM</div>
  </div>

  <!-- PANEL: Mercados con precio -->
  <div class="panel active" id="panel-mercados">
    <div class="filter-bar" id="filtersMercados"></div>
    <div class="section-title">Mercados activos con probabilidad</div>
    <div class="cards-grid" id="gridMercados"></div>
  </div>

  <!-- PANEL: Eventos LATAM -->
  <div class="panel" id="panel-eventos">
    <div class="filter-bar" id="filtersEventos"></div>
    <div class="section-title">Eventos con mercados en Polymarket / Kalshi</div>
    <div class="cards-grid" id="gridEventos"></div>
  </div>
</main>

<script>
let DATA = null;
let activeFilters = { mercados: 'todos', eventos: 'todos' };

// ── Cargar JSON ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('latamodds_feed.json');
    DATA = await resp.json();
    render();
  } catch(e) {
    document.getElementById('gridMercados').innerHTML =
      '<div class="empty">No se pudo cargar latamodds_feed.json<br>Asegúrate de que el archivo esté en la misma carpeta que este HTML.</div>';
  }
}

// ── Render principal ─────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;

  const m = DATA.mercados || [];
  const e = DATA.eventos_latam || [];
  const conPrecio = DATA.con_precio || e.filter(x => x.probabilidad != null).length;

  // Stats
  document.getElementById('statMercados').textContent = conPrecio || m.length;
  document.getElementById('statEventos').textContent = e.length;
  const ts = DATA.generado ? new Date(DATA.generado).toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'}) : '—';
  document.getElementById('statActualizado').textContent = ts;
  document.getElementById('metaBar').innerHTML =
    `Generado: <strong>${DATA.generado ? new Date(DATA.generado).toLocaleString('es-MX') : '—'}</strong>`;

  // Filtros mercados
  const plats = [...new Set(m.map(x => x.plataforma))];
  renderFilters('filtersMercados', ['todos', ...plats], 'mercados');

  // Filtros eventos
  const queries = [...new Set(e.map(x => x.query))];
  renderFilters('filtersEventos', ['todos', ...queries], 'eventos');

  renderMercados(m);
  renderEventos(e);
}

function renderFilters(containerId, options, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(o =>
    `<button class="filter-btn ${activeFilters[type] === o ? 'active' : ''}"
      onclick="setFilter('${type}','${o}',this)">${o}</button>`
  ).join('');
}

function setFilter(type, value, btn) {
  activeFilters[type] = value;
  document.querySelectorAll(`#filters${type.charAt(0).toUpperCase()+type.slice(1)} .filter-btn`)
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'mercados') renderMercados(DATA.mercados || []);
  else renderEventos(DATA.eventos_latam || []);
}

// ── Mercados con precio ───────────────────────────────────────────────────────
function renderMercados(items) {
  const f = activeFilters.mercados;
  const filtered = f === 'todos' ? items : items.filter(m => m.plataforma === f);
  const grid = document.getElementById('gridMercados');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Sin mercados para este filtro</div>';
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const p = m.precio_pct;
    const priceClass = p >= 60 ? 'high' : p >= 30 ? 'mid' : 'low';
    const expira = m.expira ? m.expira.split('T')[0] : 'N/D';
    const vol = m.volumen ? `$${Number(m.volumen).toLocaleString('es-MX')}` : 'N/D';
    const urlHtml = m.url && m.url !== 'None'
      ? `<a href="${m.url}" target="_blank" class="card-link">Ver →</a>`
      : `<span class="card-link" style="opacity:0.3">Sin URL</span>`;

    return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${m.titulo}</div>
        <div class="card-price ${priceClass}">${p}%</div>
      </div>
      <div class="card-meta">
        <span class="tag tag-platform">${m.plataforma}</span>
        <span class="tag tag-type">${m.categoria}</span>
      </div>
      <div class="card-footer">
        <div class="card-vol">Vol: <strong>${vol}</strong> · Expira: ${expira}</div>
        ${urlHtml}
      </div>
    </div>`;
  }).join('');
}

// ── Eventos LATAM ─────────────────────────────────────────────────────────────
function renderEventos(items) {
  const f = activeFilters.eventos;
  const filtered = f === 'todos' ? items : items.filter(e => e.query === f);
  const grid = document.getElementById('gridEventos');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Sin eventos para este filtro</div>';
    return;
  }

  // Ordenar: sin precio al fondo, con precio por "más interesante" (cercano a 50%)
  filtered.sort((a, b) => {
    if (a.probabilidad == null && b.probabilidad != null) return 1;
    if (a.probabilidad != null && b.probabilidad == null) return -1;
    if (a.probabilidad == null && b.probabilidad == null) return 0;
    return Math.abs(a.probabilidad - 50) - Math.abs(b.probabilidad - 50);
  });

  grid.innerHTML = filtered.slice(0, 300).map(e => {
    const confClass = e.confidence === 'high' ? 'conf-high' : e.confidence === 'medium' ? 'conf-medium' : 'conf-low';
    const fuentes = (e.fuentes || []).map(f => {
      const cls = f === 'polymarket' ? 'tag-platform' : f === 'kalshi' ? 'tag-kalshi' : f === 'opinion' ? 'tag-opinion' : 'tag-type';
      return `<span class="tag ${cls}">${f}</span>`;
    }).join('');
    const urlHtml = e.url_polymarket
      ? `<a href="${e.url_polymarket}" target="_blank" class="card-link">Ver →</a>`
      : `<span class="card-link" style="opacity:0.3">Sin URL</span>`;
    const fecha = e.fecha_evento && e.fecha_evento !== 'None' ? e.fecha_evento : 'TBD';
    const prob = e.probabilidad;
    const priceClass = prob >= 60 ? 'high' : prob >= 30 ? 'mid' : 'low';
    const priceHtml = prob !== null && prob !== undefined
      ? `<div class="card-price ${priceClass}">${prob}%</div>`
      : `<span class="conf-dot ${confClass}"></span>`;

    return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${e.titulo}<span style="display:block;font-size:11px;font-weight:300;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace;">${e.event_name || ''}</span></div>
        ${priceHtml}
      </div>
      <div class="card-meta">
        <span class="tag tag-query">${e.query}</span>
        <span class="tag tag-type">${e.tipo}</span>
        ${fuentes}
      </div>
      <div class="card-footer">
        <div class="card-vol">${fecha}</div>
        ${urlHtml}
      </div>
    </div>`;
  }).join('');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

loadData();
</script>
</body>
</html>
